<div class="fixed top-4 end-4 z-50 flex flex-col gap-2 w-80">
  @for (toast of toastService.toasts(); track toast.id) {
    <div
      class="text-white px-4 py-3 rounded-lg shadow-lg flex items-center gap-3"
      [class]="getColorClass(toast.type)"
    >
      <i [class]="getIconClass(toast.type)"></i>
      <span class="flex-1 text-sm">{{ toast.message }}</span>
      <button (click)="toastService.remove(toast.id)" class="text-white/80 hover:text-white">
        <i class="fa-solid fa-xmark"></i>
      </button>
    </div>
  }
</div>

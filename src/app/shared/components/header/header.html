<header class="app-header">
  <div class="header-inner">
    <a routerLink="/courses" class="brand">
      <i class="fa-solid fa-graduation-cap brand-icon"></i>
      {{ 'header.title' | translate }}
    </a>

    <div class="header-actions">
      <button
        type="button"
        class="theme-btn"
        (click)="themeService.toggleTheme()"
        [attr.title]="
          (themeService.isDark() ? 'header.lightMode' : 'header.darkMode') | translate
        "
        [attr.aria-label]="
          (themeService.isDark() ? 'header.lightMode' : 'header.darkMode') | translate
        "
      >
        <i
          class="fa-solid theme-icon"
          [class.fa-sun]="themeService.isDark()"
          [class.fa-moon]="!themeService.isDark()"
        ></i>
      </button>

      <button
        type="button"
        class="lang-btn"
        (click)="translationService.toggleLanguage()"
      >
        <i class="fa-solid fa-language"></i>
        <span>{{ translationService.currentLang() === 'ar' ? 'EN' : 'AR' }}</span>
      </button>
    </div>
  </div>
</header>
